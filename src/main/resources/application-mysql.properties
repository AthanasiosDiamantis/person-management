# MariaDB configuration
spring.datasource.url=jdbc:mariadb://localhost:3306/persondb
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=secret

# JPA / Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.org.hibernate.SQL=DEBUG

# Execute data.sql on startup / data.sql beim Start ausführen
spring.sql.init.mode=always

# Execute data.sql AFTER Hibernate creates tables
# data.sql erst NACH Hibernate-Tabellenerstellung ausführen
spring.jpa.defer-datasource-initialization=true

# JWT Configuration / JWT-Konfiguration
app.jwt.secret=SakiPersonManagementSecretKeyThatIsLongEnoughForHS256AlgorithmMinimum32Chars
app.jwt.expiration=86400000
# 86400000ms = 24 Stunden / 24 hours

# MailDev SMTP Configuration
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.from=noreply@person-management.com

# Mail properties
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false