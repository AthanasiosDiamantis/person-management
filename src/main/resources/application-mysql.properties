# MariaDB configuration
spring.datasource.url=jdbc:mariadb://localhost:3306/persondb
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=secret

# JPA / Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.org.hibernate.SQL=DEBUG

# Execute data.sql on startup / data.sql beim Start ausführen
spring.sql.init.mode=always

# Execute data.sql AFTER Hibernate creates tables
# data.sql erst NACH Hibernate-Tabellenerstellung ausführen
spring.jpa.defer-datasource-initialization=true