# H2 In-Memory Database for Tests / H2 In-Memory-Datenbank für Tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate configuration for Tests / Konfiguration für Tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Mail for Tests / Mail für Tests deaktivieren
spring.mail.host=localhost
spring.mail.port=1025

# JWT Secret for Tests / JWT Secret für Tests
app.jwt.secret=TestSecretKeyThatIsLongEnoughForHS256AlgorithmMinimum32Chars
app.jwt.expiration=86400000

# Disable SQL init for Tests / SQL-Init für Tests deaktivieren
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false